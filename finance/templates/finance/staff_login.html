<!-- finance/templates/finance/staff_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabiero Academy - Secure Staff Station</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #FDFAF4; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #ffffff; border: 1px solid #EAE0CC; border-radius: 20px; box-shadow: 0 12px 40px rgba(27,67,50,0.06); max-width: 440px; width: 100%; padding: 3rem 2.5rem; }
        .btn-green { background-color: #1B4332; color: #ffffff; font-weight: 600; border-radius: 100px; padding: 0.8rem; transition: all 0.2s; width: 100%; border: none; }
        .btn-green:hover { background-color: #2D6A4F; transform: translateY(-1px); }
        .form-control:focus { border-color: #2D6A4F; box-shadow: 0 0 0 0.25rem rgba(45,106,79,0.15); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div style="color: #1B4332;" class="fs-1 mb-2"><i class="bi bi-shield-lock-fill"></i></div>
        <h4 class="fw-bold text-dark mb-1">Staff Workstation</h4>
        <p class="text-muted small">Sign in to access secure financial registries or grade sheets</p>
    </div>

    <!-- Feedback Alerts Display Panel -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}info{% endif %} border-0 small py-2 text-center" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'staff_login' %}">
        {% csrf_token %}
        
        <!-- Account Username Input -->
        <div class="mb-3">
            <label class="form-label text-muted small uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.05em;">System Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-2 text-muted"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control border-2" placeholder="e.g. bursar_demo" required autocomplete="username">
            </div>
        </div>

        <!-- Security Password Input -->
        <div class="mb-4">
            <label class="form-label text-muted small uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.05em;">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-2 text-muted"><i class="bi bi-key"></i></span>
                <input type="password" name="password" class="form-control border-2" placeholder="••••••••" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn btn-green shadow-sm mb-3">Sign In to Dashboard</button>
        <a href="{% url 'public_home' %}" class="btn btn-light w-100 btn-sm text-muted rounded-pill border">Return to Main Website</a>
    </form>
</div>

</body>
</html>
