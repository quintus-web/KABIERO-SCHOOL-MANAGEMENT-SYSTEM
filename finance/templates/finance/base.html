<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kabiero Academy Portal{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 no-print">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'portal_home' %}"><i class="bi bi-mortarboard-fill text-primary me-2"></i>KABIERO ACADEMY</a>
            <div class="d-flex align-items-center">
                <a href="{% url 'portal_home' %}" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-grid-3x3-gap me-1"></i>Main Menu</a>
            </div>
        </div>
    </nav>
    <main class="container">{% block content %}{% endblock %}</main>
    <footer class="text-center text-muted small py-4 mt-5 border-top no-print">&copy; 2026 Kabiero Academy Core Platform</footer>
</body>
</html>
