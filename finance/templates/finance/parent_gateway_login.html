<!-- finance/templates/finance/parent_gateway_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabiero Academy - Parent Access Desk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #FDFAF4; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #ffffff; border: 1px solid #EAE0CC; border-radius: 16px; box-shadow: 0 10px 30px rgba(27,67,50,0.08); max-width: 420px; width: 100%; padding: 2.5rem; }
        .btn-green { background-color: #1B4332; color: #ffffff; font-weight: 600; border-radius: 100px; padding: 0.75rem; transition: all 0.2s; width: 100%; border: none; }
        .btn-green:hover { background-color: #2D6A4F; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div class="text-success fs-1 mb-2"><i class="bi bi-shield-lock"></i></div>
        <h4 class="fw-bold text-dark">Parent Portal Access</h4>
        <p class="text-muted small">Input child parameters to verify current live fee statements ledger</p>
    </div>

    <!-- Django Flash Warning Notification Box Wrapper -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger border-0 small py-2 mb-3 text-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'parent_gateway' %}">
        {% csrf_token %}
        
        <!-- Crucial Link 1: name="admission_number" -->
        <div class="mb-3">
            <label class="form-label text-muted small uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.05em;">Student Admission Number</label>
            <input type="text" name="admission_number" class="form-control form-control-lg border-2" placeholder="e.g. KAB/2026/001" required autocomplete="off">
        </div>

        <!-- Crucial Link 2: name="parent_phone" -->
        <div class="mb-4">
            <label class="form-label text-muted small uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.05em;">Registered Parent Phone Number</label>
            <input type="text" name="parent_phone" class="form-control form-control-lg border-2" placeholder="e.g. 0712345678" required autocomplete="off">
            <div class="form-text text-muted" style="font-size: 0.7rem;">Must match the phone number registered in the school records.</div>
        </div>

        <button type="submit" class="btn btn-green shadow-sm mb-3">Verify & Access Dashboard</button>
        <a href="{% url 'public_home' %}" class="btn btn-light w-100 btn-sm text-muted rounded-pill border">Return to Main Website</a>
    </form>
</div>

</body>
</html>
